
<ion-header>
   <ion-toolbar>
      <ion-buttons left>
         <button ion-button icon-only (click)="goBack()">
            <img class="header-icon" src="assets/icons/back.svg"/>
         </button>
      </ion-buttons>
      <ion-title>{{ 'a_about_mcm_title' | translate }}</ion-title>
   </ion-toolbar>
</ion-header>

<ion-content class="has-header pattern-bg">
	<div *ngFor="let milestone of milestones" class="card">
		<div class="cover">
			<img class="thumb" [src]="milestone.icon" />
		</div>
		<div class="progress">
		<ion-label class="title">{{'progress.milestone.'+milestone.name | translate}} level {{milestone.level}}</ion-label>
		<mcm-progress-bar [total]="milestone.threshold" [currentProgress]="milestone.count" [invertOrder]="true"></mcm-progress-bar>
		</div>
	</div>

</ion-content>
